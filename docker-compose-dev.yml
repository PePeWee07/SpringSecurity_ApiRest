version: '3.9'
services:
  ucacue_app:
    container_name: ucacue-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CATIA_API_HOST: ${CATIA_API_HOST_DOCKER:-http://catia_core:8082}
    volumes:
      - .:/app
      - oauth_logs:/tmp/logs
    networks:
      - virtual_assistant_network
    depends_on:
      ucacue_db:
        condition: service_healthy

  ucacue_db:
    container_name: ucacue-db
    image: postgres:13.3
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - ucacue_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - virtual_assistant_network

volumes:
  ucacue_postgres_data:
  oauth_logs:

networks:
  virtual_assistant_network:
    external: true
